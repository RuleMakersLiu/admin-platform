version: '3.8'

services:
  admin-ws:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-ws
    ports:
      - "8086:8086"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      - redis
    networks:
      - admin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: admin-ws-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - admin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  admin-network:
    external: true

volumes:
  redis-data:
