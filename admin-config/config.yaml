server:
  port: 8085
  mode: debug

database:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  username: ${DB_USER:postgres}
  password: ${DB_PASSWORD:postgres}
  database: ${DB_NAME:admin_platform}
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  db: 5
  pool_size: 10

crypto:
  # IMPORTANT: 生产环境必须通过环境变量 AES_KEY 覆盖此值
  aes_key: ${AES_KEY:admin-config-aes-key-32bytes!!12}

jwt:
  # IMPORTANT: 生产环境必须通过环境变量 JWT_SECRET 覆盖此值
  secret: ${JWT_SECRET:admin-config-jwt-secret-key-32-dev-only}
  expire: 86400

log:
  level: debug
  format: json
  output: stdout
